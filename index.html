<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThisMaga | Aurora Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --card: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --text: #ffffff;
            --sec-text: #cbd5e1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* --- Animated Aurora Background --- */
        .aurora-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            overflow: hidden;
            background: linear-gradient(125deg, #030712 0%, #0f172a 100%);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: blob-float 20s infinite alternate;
        }

        .blob-1 { top: -10%; left: -10%; width: 400px; height: 400px; background: #9333ea; animation-delay: 0s; } /* Purple */
        .blob-2 { bottom: -10%; right: -10%; width: 350px; height: 350px; background: #0ea5e9; animation-delay: -5s; } /* Blue */
        .blob-3 { top: 40%; left: 30%; width: 300px; height: 300px; background: #ec4899; animation-delay: -10s; } /* Pink */

        @keyframes blob-float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Container */
        .container {
            width: 100%;
            max-width: 430px;
            padding: 50px 20px;
            z-index: 1;
        }

        /* --- Profile Header (Glassmorphism) --- */
        .profile-box {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(20px);
            padding: 35px 25px;
            border-radius: 35px;
            text-align: center;
            border: 1px solid var(--card-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            position: relative;
        }

        .profile-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 35px;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05);
            pointer-events: none;
        }

        .pp-wrapper {
            width: 110px;
            height: 110px;
            margin: 0 auto 18px;
            position: relative;
        }

        .pp-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 30px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 25px rgba(255,255,255,0.1);
        }

        .username { font-size: 2rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 5px; }

        /* Modern Navigation Tabs */
        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
            padding: 7px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            border: none;
            background: transparent;
            color: var(--sec-text);
            cursor: pointer;
            font-weight: 600;
            border-radius: 16px;
            transition: 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .tab-btn.active {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Sections */
        .content-section { display: none; animation: tabFadeIn 0.6s ease; }
        .content-section.active { display: block; }

        @keyframes tabFadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Cards Style --- */
        .card {
            background: var(--card);
            backdrop-filter: blur(10px);
            padding: 22px;
            border-radius: 25px;
            margin-bottom: 18px;
            border: 1px solid var(--card-border);
            transition: 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-4px);
        }

        /* Lang Bar */
        .lang-bar { display: flex; gap: 10px; margin-bottom: 18px; justify-content: center;}
        .lang-dot {
            font-size: 0.75rem;
            padding: 6px 14px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            transition: 0.3s;
        }
        .lang-dot.active { background: #fff; color: #000; font-weight: 700; }

        /* --- Bot Cards with Images --- */
        .bot-card-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bot-pp {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.1);
            object-fit: cover;
        }

        .bot-info-text { flex: 1; }

        /* Pulse Status */
        .status-online {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 0.7rem; color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
            padding: 4px 10px; border-radius: 20px;
            margin-bottom: 5px;
        }
        .pulse { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; animation: pulse-animation 1.5s infinite; }
        @keyframes pulse-animation { 0% { box-shadow: 0 0 0 0px rgba(34, 197, 94, 0.7); } 100% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); } }

        .social-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: rgba(255,255,255,0.05);
            color: white;
            text-decoration: none;
            padding: 18px; border-radius: 20px;
            font-weight: 700;
            border: 1px solid var(--card-border);
            transition: 0.3s;
        }
        .social-btn:hover { background: #fff; color: #000; }

    </style>
</head>
<body>

<div class="aurora-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<div class="container">
    <div class="profile-box">
        <div class="pp-wrapper">
            <img src="https://t.me/i/userpic/320/ThisMaga.jpg" alt="ThisMaga">
        </div>
        <h1 class="username">ThisMaga</h1>
        <p style="color: var(--sec-text); font-weight: 500; font-size: 0.95rem; margin-top: -5px;">@ThisMaga</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('main', this)">
            <i class="fas fa-user"></i> Main
        </button>
        <button class="tab-btn" onclick="showTab('bots', this)">
            <i class="fas fa-code-branch"></i> Bots
        </button>
    </div>

    <div id="main" class="content-section active">
        <div class="card" style="cursor: default;">
            <div class="lang-bar">
                <span class="lang-dot active" onclick="changeLang('az')">AZ</span>
                <span class="lang-dot" onclick="changeLang('tr')">TR</span>
                <span class="lang-dot" onclick="changeLang('en')">EN</span>
            </div>
            <p id="about-text" style="font-size: 0.95rem; line-height: 1.8; color: var(--sec-text); text-align: center;">
                Tərtibatçı və Bot Yaradıcısı. Layihələrimlə həyatı asanlaşdırmağı və rəqəmsal dünyada yeniliklər etməyi sevirəm.
            </p>
        </div>

        <p style="font-size: 0.8rem; color: var(--sec-text); margin: 25px 0 12px 10px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600;">Əlaqə</p>
        <a href="https://t.me/ThisMaga" class="social-btn">
            <i class="fab fa-telegram-plane" style="font-size: 1.3rem;"></i> Telegram Me
        </a>
    </div>

    <div id="bots" class="content-section">
        <div class="card" onclick="window.location.href='https://T.me/AzeCallBomberBot'">
            <div class="bot-card-content">
                <img src="https://t.me/i/userpic/320/AzeCallBomberBot.jpg" alt="Call Bomber PP" class="bot-pp">
                <div class="bot-info-text">
                    <div class="status-online"><div class="pulse"></div> <span class="status-text">Active</span></div>
                    <h3 style="font-size: 1.1rem; margin-bottom: 2px;">AzeCallBomberBot</h3>
                    <p id="bot1-info" style="font-size: 0.8rem; color: var(--sec-text);">Nömrələrə dayanmadan zəng göndər.</p>
                </div>
                <i class="fas fa-chevron-right" style="color: rgba(255,255,255,0.2); font-size: 0.9rem;"></i>
            </div>
        </div>

        <div class="card" onclick="window.location.href='https://T.me/DijitalGiftsBot'">
            <div class="bot-card-content">
                <img src="https://t.me/i/userpic/320/DijitalGiftsBot.jpg" alt="Digital Gifts PP" class="bot-pp">
                <div class="bot-info-text">
                    <div class="status-online"><div class="pulse"></div> <span class="status-text">Active</span></div>
                    <h3 style="font-size: 1.1rem; margin-bottom: 2px;">DijitalGiftsBot</h3>
                    <p id="bot2-info" style="font-size: 0.8rem; color: var(--sec-text);">Coin yığıb hədiyyələr al.</p>
                </div>
                <i class="fas fa-chevron-right" style="color: rgba(255,255,255,0.2); font-size: 0.9rem;"></i>
            </div>
        </div>
    </div>
</div>

<script>
    function showTab(tabId, btn) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    const dict = {
        az: { about: "Tərtibatçı və Bot Yaradıcısı. Layihələrimlə həyatı asanlaşdırmağı və rəqəmsal dünyada yeniliklər etməyi sevirəm.", bot1: "Nömrələrə dayanmadan zəng göndər.", bot2: "Coin yığıb hədiyyələr al.", online: "Aktiv" },
        tr: { about: "Geliştirici ve Bot Oluşturucu. Projelerimle hayatı kolaylaştırmayı ve dijital dünyada yenilik yapmayı seviyorum.", bot1: "Numaralara kesintisiz arama gönder.", bot2: "Jeton toplayıp hediyeler alın.", online: "Aktif" },
        en: { about: "Developer & Bot Creator. I love making life easier with my projects and innovating in the digital world.", bot1: "Send non-stop calls to numbers.", bot2: "Collect coins and get gifts.", online: "Active" }
    };

    function changeLang(l) {
        document.getElementById('about-text').innerText = dict[l].about;
        document.getElementById('bot1-info').innerText = dict[l].bot1;
        document.getElementById('bot2-info').innerText = dict[l].bot2;
        document.querySelectorAll('.status-text').forEach(el => el.innerText = dict[l].online);
        
        document.querySelectorAll('.lang-dot').forEach(d => {
            d.classList.remove('active');
            if(d.innerText.toLowerCase() == l) d.classList.add('active');
        });
    }
</script>

</body>
</html>
